name: lmx Model Picker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lmx
        run: pip install git+https://github.com/my-ai-stack/lmx.git

      - name: Pick cheapest model for task
        run: |
          if [ -n "$OPENAI_API_KEY" ] || [ -n "$GROQ_API_KEY" ] || [ -n "$TOGETHER_API_KEY" ]; then
            echo "Summarize API documentation" | lmx pick --stdin --budget 0.05 --json
          else
            echo "Skipping - no API keys available"
            exit 0
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}

      - name: Get code recommendation
        run: |
          if [ -n "$OPENAI_API_KEY" ] || [ -n "$GROQ_API_KEY" ]; then
            echo "Write a REST API endpoint" | lmx pick --stdin --code --budget 0.50 --json
          else
            echo "Skipping - no API keys available"
            exit 0
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lmx
        run: pip install git+https://github.com/my-ai-stack/lmx.git

      - name: Code review with premium model
        run: |
          if [ -n "$OPENAI_API_KEY" ] || [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "${{ github.event.pull_request.body }}" | lmx pick --stdin --code --budget 5.00 --json
          else
            echo "Skipping - no API keys available"
            exit 0
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
